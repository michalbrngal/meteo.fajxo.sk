      discovery_rules:
        - uuid: 7bec8fc101b84842b1b38b38f3b26360
          name: 'Ecowitt: soil sensors discovery'
          type: DEPENDENT
          key: ecowitt.soil.discovery
          delay: '0'
          item_prototypes:
            - uuid: bf3916bf3a0c4262a97ab5e3a082211f
              name: 'Soil {#CH} ({#NAME}): battery'
              type: DEPENDENT
              key: 'ecowitt.soil.batt[{#CH}]'
              delay: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.ch_soil[?(@.channel=="{#CH}")].battery.first()'
                - type: REGEX
                  parameters:
                    - (\d+)
                    - \1
              master_item:
                key: ecowitt.raw
            - uuid: b4ce7dc2400f458f890c0a83bedaf2a4
              name: 'Soil {#CH} ({#NAME}): humidity'
              type: DEPENDENT
              key: 'ecowitt.soil.humi[{#CH}]'
              delay: '0'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.ch_soil[?(@.channel=="{#CH}")].humidity.first()'
                - type: REGEX
                  parameters:
                    - '(-?\d+(\.\d+)?)'
                    - \1
              master_item:
                key: ecowitt.raw
            - uuid: 9c3ddbe0fbc2452eaa70089303269c57
              name: 'Soil {#CH} ({#NAME}): voltage'
              type: DEPENDENT
              key: 'ecowitt.soil.voltage[{#CH}]'
              delay: '0'
              value_type: FLOAT
              units: V
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.ch_soil[?(@.channel=="{#CH}")].voltage.first()'
                - type: REGEX
                  parameters:
                    - '(-?\d+(\.\d+)?)'
                    - \1
              master_item:
                key: ecowitt.raw
          master_item:
            key: ecowitt.raw
          lld_macro_paths:
            - lld_macro: '{#CH}'
              path: $.channel
            - lld_macro: '{#NAME}'
              path: $.name
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.ch_soil[*]'
      macros:
        - macro: '{$ECOWITT.URL}'
          value: 'http://127.0.0.1/get_livedata_info'
          description: 'Ecowitt gateway livedata URL (override on host)'
