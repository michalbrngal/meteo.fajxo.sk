<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="thermo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#sky)" stroke="#1e2d4a" stroke-width="2"/>
  <!-- Sun -->
  <circle cx="44" cy="18" r="9" fill="url(#sun)" opacity="0.95"/>
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="44" y1="5" x2="44" y2="7"/>
    <line x1="44" y1="29" x2="44" y2="31"/>
    <line x1="31" y1="18" x2="33" y2="18"/>
    <line x1="55" y1="18" x2="57" y2="18"/>
    <line x1="35" y1="9" x2="36.5" y2="10.5"/>
    <line x1="51.5" y1="25.5" x2="53" y2="27"/>
    <line x1="35" y1="27" x2="36.5" y2="25.5"/>
    <line x1="51.5" y1="10.5" x2="53" y2="9"/>
  </g>
  <!-- Cloud -->
  <g transform="translate(-2, 4)">
    <ellipse cx="26" cy="32" rx="12" ry="8" fill="url(#cloud)" opacity="0.95"/>
    <ellipse cx="18" cy="34" rx="8" ry="6" fill="url(#cloud)" opacity="0.95"/>
    <ellipse cx="34" cy="34" rx="9" ry="6" fill="url(#cloud)" opacity="0.95"/>
  </g>
  <!-- Thermometer -->
  <g transform="translate(10, 28)">
    <rect x="0" y="0" width="5" height="20" rx="2.5" fill="#1e2d4a" stroke="url(#thermo)" stroke-width="1.2"/>
    <circle cx="2.5" cy="23" r="4.5" fill="url(#thermo)" opacity="0.9"/>
    <rect x="1.2" y="8" width="2.6" height="12" rx="1.3" fill="url(#thermo)" opacity="0.85"/>
    <!-- Tick marks -->
    <line x1="5.5" y1="5" x2="7.5" y2="5" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>
    <line x1="5.5" y1="9" x2="7.5" y2="9" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>
    <line x1="5.5" y1="13" x2="7.5" y2="13" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>
    <line x1="5.5" y1="17" x2="7.5" y2="17" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
